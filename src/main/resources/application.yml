spring:
  datasource:
    url: jdbc:h2:mem:payments;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true

payment:
  validation:
    min-amount: 0.01
    max-amount: 250000.00
    allowed-currencies: EUR,USD,GBP
    require-debtor-and-creditor: true

aws:
  s3:
    inbound-bucket: bulk-payment-inbound
  eventbridge:
    ack-bus-name: bulk-payment-status-bus
